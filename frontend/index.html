<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Path Axiom – Employee Portal</title>
    <meta name="description" content="Sign in or register on the Path Axiom employee portal to manage HR tasks, payroll, and leave requests." />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Preconnect eliminates DNS + TLS delay before fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- All fonts in one request · display=swap = never render-blocking -->
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
